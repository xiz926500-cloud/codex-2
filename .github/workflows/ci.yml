name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  repository-health:
    name: Repository health
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify repository conventions
        shell: powershell
        run: .\scripts\verify.ps1
